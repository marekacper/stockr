{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6">Dodaj transakcję</h1>
<form method="post" action="/add" class="bg-white rounded-xl shadow-sm p-6 max-w-md space-y-4">

  <div>
    <label class="block text-sm font-medium mb-1">Ticker</label>
    <input name="ticker" placeholder="np. CDR, PKN.WA, SPY"
      class="w-full border rounded-lg px-3 py-2 text-sm" required>
    <p class="text-xs text-gray-400 mt-1">GPW: użyj formatu PKN.WA · Zagraniczne: SPY, AAPL</p>
  </div>

  <div>
    <label class="block text-sm font-medium mb-1">Data</label>
    <input name="date" type="date" class="w-full border rounded-lg px-3 py-2 text-sm" required>
  </div>

  <div>
    <label class="block text-sm font-medium mb-1">Typ</label>
    <select name="type" class="w-full border rounded-lg px-3 py-2 text-sm">
      <option value="buy">Kupno</option>
      <option value="sell">Sprzedaż</option>
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium mb-1">Ilość</label>
    <input name="quantity" type="number" step="0.0001" min="0"
      class="w-full border rounded-lg px-3 py-2 text-sm" required>
  </div>

  <div>
    <label class="block text-sm font-medium mb-1">Cena (PLN)</label>
    <input name="price" type="number" step="0.01" min="0"
      class="w-full border rounded-lg px-3 py-2 text-sm" required>
  </div>

  <div>
    <label class="block text-sm font-medium mb-1">Prowizja (PLN)</label>
    <input name="commission" type="number" step="0.01" value="0"
      class="w-full border rounded-lg px-3 py-2 text-sm">
  </div>

  <button type="submit"
    class="w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700">
    Zapisz transakcję
  </button>
</form>
{% endblock %}
